name: Retrain NBA Model

on:
  schedule:
    # Runs daily at 12:00 UTC (8am ET) — adjust to your timezone
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Lets you trigger a manual run anytime from the GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run model & generate predictions
        run: python nba_betting_model.py

      - name: Commit predictions.json back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.json
          git diff --cached --quiet || git commit -m "auto: update predictions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
