<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Edge Model</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090b0f;--surface:#0f1318;--surface2:#141920;
  --border:#1e2530;--accent:#00e5ff;--green:#00ff87;
  --red:#ff3d5a;--yellow:#ffd600;--purple:#b388ff;
  --muted:#4a5568;--text:#e2e8f0;--dim:#718096;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.012) 2px,rgba(0,229,255,0.012) 4px);pointer-events:none;z-index:9999}

header{padding:18px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--accent)}
.logo span{color:var(--dim);font-weight:400}
.header-right{display:flex;align-items:center;gap:16px}
.updated{font-size:11px;color:var(--dim)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 32px}
.tab{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:12px 18px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.main{max-width:1140px;margin:0 auto;padding:24px 20px}
.tab-content{display:none}
.tab-content.active{display:block}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.stat-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.stat-value{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--accent)}
.stat-value.green{color:var(--green)}.stat-value.yellow{color:var(--yellow)}.stat-value.red{color:var(--red)}

.section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}

/* Game Cards */
.games-grid{display:grid;gap:14px;margin-bottom:32px}
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color 0.2s}
.game-card:hover{border-color:rgba(255,255,255,0.12)}
.game-card.has-rec{border-color:rgba(0,255,135,0.4)}
.game-card.b2b{border-color:rgba(255,214,0,0.4)}
.game-card.star-out{border-color:rgba(255,61,90,0.4)}

.game-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.matchup{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-0.5px}
.matchup .vs{color:var(--border);margin:0 8px}
.matchup .away{color:var(--dim)}
.hbadges{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.badge{font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:3px}
.badge.rec{background:rgba(0,255,135,0.12);color:var(--green);border:1px solid rgba(0,255,135,0.3)}
.badge.b2b{background:rgba(255,214,0,0.1);color:var(--yellow);border:1px solid rgba(255,214,0,0.3)}
.badge.out{background:rgba(255,61,90,0.1);color:var(--red);border:1px solid rgba(255,61,90,0.3)}
.badge.time{background:rgba(255,255,255,0.04);color:var(--dim);border:1px solid var(--border)}
.badge.player{background:rgba(179,136,255,0.1);color:var(--purple);border:1px solid rgba(179,136,255,0.3)}

.game-body{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:0}
.gs{padding:14px 18px;border-right:1px solid var(--border)}
.gs:last-child{border-right:none}
.gs-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}

.prob-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:5px 0}
.prob-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width 1s ease}
.prob-row{display:flex;justify-content:space-between;margin-top:6px}
.prob-h{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent)}
.prob-a{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--dim)}
.model-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.mtag{font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,0.04);color:var(--dim)}
.mtag.agree{background:rgba(0,255,135,0.08);color:var(--green)}

.pred-big{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1}
.pred-vs{font-size:11px;color:var(--dim);margin-top:3px}
.pred-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* Recommendations with factor attribution */
.recs-section{padding:12px 18px;border-top:1px solid var(--border);background:rgba(0,255,135,0.025)}
.rec-block{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.rec-block:last-child{border-bottom:none}
.rec-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rec-grade{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;width:22px}
.grade-A{color:var(--green)}.grade-B{color:var(--yellow)}.grade-C{color:var(--dim)}
.rec-type{font-size:10px;letter-spacing:1px;padding:2px 7px;border-radius:3px;background:rgba(0,229,255,0.1);color:var(--accent)}
.rec-side{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.rec-edge{font-size:11px;color:var(--green)}
.rec-kelly{font-size:11px;color:var(--yellow)}
.rec-reason{font-size:11px;color:var(--dim);margin-bottom:5px}
.factors-wrap{display:flex;flex-wrap:wrap;gap:5px}
.factor-tag{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid;display:flex;align-items:center;gap:4px}
.factor-tag.pos{background:rgba(0,255,135,0.06);border-color:rgba(0,255,135,0.2);color:var(--green)}
.factor-tag.neg{background:rgba(255,61,90,0.06);border-color:rgba(255,61,90,0.2);color:var(--red)}

/* Injuries section */
.inj-section{padding:10px 18px;border-top:1px solid var(--border);background:rgba(255,61,90,0.025)}
.inj-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:4px;font-size:11px}
.inj-row:last-child{margin-bottom:0}
.inj-status{font-weight:600;min-width:90px}
.inj-status.out{color:var(--red)}.inj-status.q{color:var(--yellow)}
.inj-names{color:var(--dim)}

/* Player stats section */
.player-section{padding:10px 18px;border-top:1px solid var(--border)}
.player-teams{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.player-team-title{font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.player-row{display:grid;grid-template-columns:1fr 28px 28px 28px 40px;gap:4px;font-size:10px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--dim)}
.player-row:last-child{border-bottom:none}
.player-row .pname{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-row .pval{text-align:right}
.player-header{display:grid;grid-template-columns:1fr 28px 28px 28px 40px;gap:4px;font-size:9px;color:var(--muted);padding-bottom:3px;border-bottom:1px solid var(--border);letter-spacing:0.5px;margin-bottom:2px}
.team-stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04)}
.tstat{font-size:10px;color:var(--dim)}.tstat span{color:var(--text);margin-left:3px}

.elo-row{padding:7px 18px;font-size:11px;color:var(--dim);border-top:1px solid var(--border);display:flex;gap:14px}
.elo-v{color:var(--text)}

.alert-row{padding:8px 18px;background:rgba(255,214,0,0.05);border-top:1px solid rgba(255,214,0,0.2);font-size:11px;color:var(--yellow)}

/* Backtest Tab */
.bt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.bt-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px}
.bt-title{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.bt-big{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;line-height:1}
.bt-sub{font-size:11px;color:var(--dim);margin-top:4px}
.bt-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border)}
.bt-row:last-child{border-bottom:none}
.bt-key{color:var(--dim)}.bt-val{color:var(--text);font-weight:600}

.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:20px}
.chart-title{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
canvas{width:100%!important;max-height:180px}

/* Feature importance */
.fi-bar-wrap{margin-bottom:6px}
.fi-label{font-size:11px;color:var(--text);margin-bottom:3px;display:flex;justify-content:space-between}
.fi-bar-bg{height:5px;background:var(--border);border-radius:3px}
.fi-bar-fill{height:5px;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green))}

.cal-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.cal-table th{text-align:left;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;padding:6px 10px;border-bottom:1px solid var(--border)}
.cal-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.03)}
.cal-good{color:var(--green)}.cal-bad{color:var(--red)}

.month-table{width:100%;border-collapse:collapse;font-size:12px}
.month-table th{text-align:left;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;padding:6px 10px;border-bottom:1px solid var(--border)}
.month-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.03)}

/* Strategy Tab */
.strategy-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.strategy-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.strategy-card.full{grid-column:1/-1}
.sc-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rule{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.rule:last-child{border-bottom:none}
.rule-num{font-family:'Syne',sans-serif;font-weight:800;color:var(--accent);min-width:20px;font-size:14px}
.rule-text{font-size:12px;color:var(--text)}.rule-sub{font-size:10px;color:var(--dim);margin-top:2px}
.today-rec{background:rgba(0,255,135,0.03);border:1px solid rgba(0,255,135,0.15);border-radius:6px;padding:12px 14px;margin-bottom:10px}
.today-rec.warn{background:rgba(255,214,0,0.03);border-color:rgba(255,214,0,0.2)}
.today-rec.skip{background:rgba(255,255,255,0.01);border-color:var(--border)}
.tr-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.tr-game{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.grade-pill-A{background:rgba(0,255,135,0.15);color:var(--green);padding:2px 10px;border-radius:3px;font-size:11px;font-family:'Syne',sans-serif;font-weight:800}
.grade-pill-B{background:rgba(255,214,0,0.12);color:var(--yellow);padding:2px 10px;border-radius:3px;font-size:11px;font-family:'Syne',sans-serif;font-weight:800}
.grade-pill-PASS{background:rgba(255,255,255,0.04);color:var(--muted);padding:2px 10px;border-radius:3px;font-size:11px;font-family:'Syne',sans-serif;font-weight:800}
.tr-action{font-size:12px;color:var(--text);margin-bottom:3px}
.tr-rationale{font-size:11px;color:var(--dim)}
.insight-list{list-style:none;padding:0}
.insight-list li{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;display:flex;align-items:flex-start;gap:8px}
.insight-list li:last-child{border-bottom:none}
.ins-icon{min-width:14px;color:var(--accent)}
/* pillar cards */
.pillar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.pillar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.pillar-icon{font-size:20px;margin-bottom:8px}
.pillar-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px}
.pillar-body{font-size:11px;color:var(--dim);line-height:1.65}
/* how-it-works flow */
.flow{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.flow-step{padding:14px;border-right:1px solid var(--border);position:relative}
.flow-step:last-child{border-right:none}
.flow-n{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:rgba(0,229,255,0.12);line-height:1;margin-bottom:6px}
.flow-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text);margin-bottom:5px}
.flow-body{font-size:11px;color:var(--dim);line-height:1.6}
/* output glossary */
.gloss{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.gloss-row{display:grid;grid-template-columns:140px 1fr;border-bottom:1px solid rgba(255,255,255,0.04)}
.gloss-row:last-child{border-bottom:none}
.gloss-term{padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);background:rgba(0,229,255,0.03);display:flex;align-items:center}
.gloss-def{padding:10px 14px;font-size:12px;color:var(--dim);line-height:1.55;display:flex;align-items:center}
.gloss-def strong{color:var(--text);font-weight:600}
/* grade legend */
.grade-legend{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.gl-item{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.gl-badge{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:6px}
.gl-badge.A{color:var(--green)}.gl-badge.B{color:var(--yellow)}.gl-badge.C{color:var(--muted)}.gl-badge.P{color:var(--dim)}
.gl-title{font-size:12px;color:var(--text);margin-bottom:4px;font-weight:600}
.gl-body{font-size:11px;color:var(--dim);line-height:1.55}

.no-odds-notice{background:rgba(255,214,0,0.05);border:1px solid rgba(255,214,0,0.2);border-radius:6px;padding:9px 14px;font-size:11px;color:var(--yellow);margin-bottom:18px}
.loading{text-align:center;padding:60px 20px;color:var(--dim)}
.spinner{width:34px;height:34px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.refresh-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 12px;border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all 0.2s}
.refresh-btn:hover{background:var(--accent);color:var(--bg)}
.no-data{text-align:center;padding:40px;color:var(--dim);font-size:13px}

@media(max-width:700px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .game-body{grid-template-columns:1fr}
  .gs{border-right:none;border-bottom:1px solid var(--border)}
  .bt-grid,.strategy-grid,.player-teams{grid-template-columns:1fr}
  .strategy-card.full{grid-column:1}
  .tabs{padding:0 12px}
  .tab{padding:10px 10px;font-size:10px}
  .pillar-grid{grid-template-columns:repeat(2,1fr)}
  .flow{grid-template-columns:1fr 1fr}
  .flow-step{border-right:none;border-bottom:1px solid var(--border)}
  .flow-step:nth-child(2n){border-right:none}
  .grade-legend{flex-direction:column}
}
</style>
</head>
<body>

<header>
  <div class="logo">NBA<span>/</span>EDGE</div>
  <div class="header-right">
    <div class="updated"><span class="dot"></span><span id="last-updated">Loading...</span></div>
    <button class="refresh-btn" onclick="loadAll()">REFRESH</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('picks',this)">PICKS</button>
  <button class="tab" onclick="switchTab('backtest',this)">BACKTEST</button>
  <button class="tab" onclick="switchTab('strategy',this)">STRATEGY</button>
</div>

<!-- ═══ PICKS ═══ -->
<div id="tab-picks" class="tab-content active">
<div class="main">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">LR AUC</div><div class="stat-value" id="lr-auc">--</div></div>
    <div class="stat-card"><div class="stat-label">XGB AUC</div><div class="stat-value" id="xgb-auc">--</div></div>
    <div class="stat-card"><div class="stat-label">Spread MAE</div><div class="stat-value yellow" id="sp-mae">--</div></div>
    <div class="stat-card"><div class="stat-label">Total MAE</div><div class="stat-value yellow" id="tot-mae">--</div></div>
  </div>
  <div id="no-odds-notice" class="no-odds-notice" style="display:none">
    No live sportsbook lines — add ODDS_API_KEY secret to enable line comparison and bet recommendations.
  </div>
  <div class="section-title"><span id="games-title">TODAY'S PICKS</span></div>
  <div class="games-grid" id="games-container">
    <div class="loading"><div class="spinner"></div><div>Loading predictions...</div></div>
  </div>
</div>
</div>

<!-- ═══ BACKTEST ═══ -->
<div id="tab-backtest" class="tab-content">
<div class="main">
  <div id="bt-container">
    <div class="loading"><div class="spinner"></div><div>Loading backtest...</div></div>
  </div>
</div>
</div>

<!-- ═══ STRATEGY ═══ -->
<div id="tab-strategy" class="tab-content">
<div class="main">
  <div id="strategy-container">
    <div class="loading"><div class="spinner"></div><div>Loading strategy...</div></div>
  </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}

async function loadAll() {
  await Promise.all([loadPicks(), loadBacktest(), loadStrategy()]);
}

// ─── PICKS ───────────────────────────────────────────

async function loadPicks() {
  const c = document.getElementById('games-container');
  c.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading...</div></div>';
  try {
    const data = await fetch('./predictions.json?t='+Date.now()).then(r=>r.json());
    const d = new Date(data.generated_at);
    document.getElementById('last-updated').textContent =
      'Updated '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+
      ' at '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    if (data.model_stats) {
      const ms = data.model_stats;
      document.getElementById('lr-auc').textContent  = ms.ml_lr_auc  || '--';
      document.getElementById('xgb-auc').textContent = ms.ml_xgb_auc || '--';
      document.getElementById('sp-mae').textContent  = (ms.spread_mae||'--')+' pts';
      document.getElementById('tot-mae').textContent = (ms.totals_mae||'--')+' pts';
    }
    if (!data.has_live_odds) document.getElementById('no-odds-notice').style.display='block';
    const games = data.games || [];
    document.getElementById('games-title').textContent =
      games.length ? `TODAY'S PICKS (${games.length})` : 'NO GAMES TODAY';
    if (!games.length) {
      c.innerHTML = '<div class="no-data">No games scheduled today.</div>'; return;
    }
    c.innerHTML = games.map(renderGame).join('');
    requestAnimationFrame(() => {
      document.querySelectorAll('.prob-fill').forEach(el => el.style.width = el.dataset.w+'%');
    });
  } catch(e) {
    c.innerHTML = `<div style="padding:16px;color:var(--red);font-size:12px">Could not load predictions.json — run the model first.<br><small style="opacity:0.5">${e.message}</small></div>`;
  }
}

function fmtOdds(o) { return !o ? '--' : o>0 ? '+'+o : String(o); }
function fmtPct(v) { return v ? (v*100).toFixed(1)+'%' : '--'; }

function renderGame(g) {
  if (g.error) return `<div class="game-card" style="padding:16px;color:var(--red)">${g.matchup}: ${g.error}</div>`;

  const ml   = g.moneyline      || {};
  const sp   = g.spread         || {};
  const tot  = g.totals         || {};
  const elo  = g.elo            || {};
  const recs = g.recommendations|| [];
  const book = g.book_odds      || {};
  const inj  = g.injuries       || {};
  const pp   = g.player_profiles|| {};
  const facs = g.top_factors    || [];

  const hwp      = ((ml.home_win_prob||0.5)*100).toFixed(1);
  const awp      = ((ml.away_win_prob||0.5)*100).toFixed(1);
  const hasRec   = recs.length > 0;
  const hasInj   = (inj.home?.out?.length||0)+(inj.away?.out?.length||0) > 0;
  const starOut  = inj.home?.star_out || inj.away?.star_out;
  const hasAlert = (g.fatigue_alert||[]).length > 0;
  const hasPP    = pp.has_data && (pp.home?.top_players?.length||0) > 0;

  const margin = sp.predicted_margin !== undefined
    ? (sp.predicted_margin>=0?'+':'')+sp.predicted_margin.toFixed(1) : '--';
  const total  = tot.predicted_total || '--';

  const bookML  = book.h2h_home ? `<div style="font-size:10px;color:var(--dim);margin-top:3px">Book: ${fmtOdds(book.h2h_home)} / ${fmtOdds(book.h2h_away)}</div>` : '';
  const bookSP  = book.spread_line!=null ? `<div class="pred-vs">Book: ${book.spread_line>0?'+':''}${book.spread_line}</div>` : '';
  const bookTOT = book.total_line ? `<div class="pred-vs">Book: ${book.total_line}</div>` : '';

  // Recommendations with factor attribution
  const recsHtml = hasRec ? `
    <div class="recs-section">
      ${recs.map(r => {
        const topF = r.top_factors || [];
        return `<div class="rec-block">
          <div class="rec-header">
            <div class="rec-grade grade-${r.grade}">${r.grade}</div>
            <div class="rec-type">${r.type}</div>
            <div class="rec-side">${r.side}</div>
            <div class="rec-edge">+${(r.edge*100).toFixed(1)}% edge</div>
            <div class="rec-kelly">${r.kelly_pct}% Kelly</div>
          </div>
          <div class="rec-reason">${r.reason}</div>
          ${topF.length ? `<div class="factors-wrap">
            ${topF.map(f=>`<div class="factor-tag pos">&uarr; ${f}</div>`).join('')}
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>` : '';

  // Factor attribution (all games)
  const factorsHtml = facs.length ? `
    <div style="padding:8px 18px;border-top:1px solid var(--border);background:rgba(0,229,255,0.02)">
      <div style="font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Key Factors</div>
      <div class="factors-wrap">
        ${facs.slice(0,6).map(f=>`
          <div class="factor-tag ${f.direction==='+'?'pos':'neg'}" title="${f.detail}">
            ${f.direction==='+'?'&uarr;':'&darr;'} ${f.label}
          </div>`).join('')}
      </div>
    </div>` : '';

  // Injury section
  const injHtml = (hasInj || inj.home?.questionable?.length || inj.away?.questionable?.length) ? `
    <div class="inj-section">
      <div style="font-size:10px;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Injury Report</div>
      ${inj.home?.out?.length ? `<div class="inj-row"><div class="inj-status out">OUT (${g.home_team})</div><div class="inj-names">${inj.home.out.join(', ')}</div></div>` : ''}
      ${inj.home?.questionable?.length ? `<div class="inj-row"><div class="inj-status q">QST (${g.home_team})</div><div class="inj-names">${inj.home.questionable.join(', ')}</div></div>` : ''}
      ${inj.away?.out?.length ? `<div class="inj-row"><div class="inj-status out">OUT (${g.away_team})</div><div class="inj-names">${inj.away.out.join(', ')}</div></div>` : ''}
      ${inj.away?.questionable?.length ? `<div class="inj-row"><div class="inj-status q">QST (${g.away_team})</div><div class="inj-names">${inj.away.questionable.join(', ')}</div></div>` : ''}
    </div>` : '';

  // Player stats section
  const playerHtml = hasPP ? `
    <div class="player-section">
      <div style="font-size:10px;color:var(--purple);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Player Stats</div>
      <div class="player-teams">
        ${[['home',g.home_team],['away',g.away_team]].map(([side,abbr]) => {
          const prof = pp[side] || {};
          const players = prof.top_players || [];
          return `<div>
            <div class="player-team-title">${abbr}</div>
            <div class="player-header">
              <span>Player</span><span class="pval">PTS</span><span class="pval">REB</span><span class="pval">AST</span><span class="pval">FG%</span>
            </div>
            ${players.map(p=>`<div class="player-row">
              <span class="pname">${p.name||''}</span>
              <span class="pval">${p.pts||0}</span>
              <span class="pval">${p.reb||0}</span>
              <span class="pval">${p.ast||0}</span>
              <span class="pval">${p.fg_pct?(p.fg_pct*100).toFixed(0)+'%':'--'}</span>
            </div>`).join('')}
            <div class="team-stats-row">
              <div class="tstat">BPM<span>${prof.team_bpm||0}</span></div>
              <div class="tstat">PER<span>${prof.team_per||0}</span></div>
              <div class="tstat">VORP<span>${prof.team_vorp||0}</span></div>
              <div class="tstat">3P%<span>${prof.fg3_pct?(prof.fg3_pct*100).toFixed(1)+'%':'--'}</span></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  const alertHtml = hasAlert ? `
    <div class="alert-row">${g.fatigue_alert.map(a=>`&#9888; ${a}`).join('  &nbsp;')}</div>` : '';

  return `
  <div class="game-card ${hasRec?'has-rec':''} ${hasAlert?'b2b':''} ${starOut?'star-out':''}">
    <div class="game-header">
      <div class="matchup">
        <span>${g.home_team}</span><span class="vs">vs</span><span class="away">${g.away_team}</span>
      </div>
      <div class="hbadges">
        ${hasRec?'<span class="badge rec">EDGE FOUND</span>':''}
        ${starOut?'<span class="badge out">STAR OUT</span>':''}
        ${hasAlert?'<span class="badge b2b">B2B</span>':''}
        ${hasPP?'<span class="badge player">PLAYER DATA</span>':''}
        <span class="badge time">${g.game_time||'TBD'}</span>
      </div>
    </div>

    <div class="game-body">
      <div class="gs">
        <div class="gs-label">Win Probability</div>
        <div style="font-size:10px;color:var(--dim);display:flex;justify-content:space-between;margin-bottom:3px">
          <span>${g.home_team}</span><span>${g.away_team}</span>
        </div>
        <div class="prob-bar"><div class="prob-fill" data-w="${hwp}" style="width:0%"></div></div>
        <div class="prob-row"><div class="prob-h">${hwp}%</div><div class="prob-a">${awp}%</div></div>
        ${bookML}
        <div class="model-tags">
          <span class="mtag">LR ${((ml.lr_prob||0)*100).toFixed(0)}%</span>
          <span class="mtag">XGB ${((ml.xgb_prob||0)*100).toFixed(0)}%</span>
          <span class="mtag">ELO ${((ml.elo_prob||0)*100).toFixed(0)}%</span>
          <span class="mtag ${ml.model_consensus?'agree':''}">${ml.model_consensus?'AGREE':'SPLIT'}</span>
        </div>
      </div>
      <div class="gs">
        <div class="gs-label">Spread (Home)</div>
        <div class="pred-big">${margin}</div>
        ${bookSP}
        <div class="pred-sub">MAE &plusmn;${sp.model_mae||'--'} pts</div>
      </div>
      <div class="gs">
        <div class="gs-label">Total Points</div>
        <div class="pred-big">${total}</div>
        ${bookTOT}
        <div class="pred-sub">MAE &plusmn;${tot.model_mae||'--'} pts</div>
      </div>
    </div>

    ${recsHtml}
    ${factorsHtml}
    ${injHtml}
    ${playerHtml}
    ${alertHtml}

    <div class="elo-row">
      <span>ELO <span class="elo-v">${elo.home||'--'}</span> vs <span class="elo-v">${elo.away||'--'}</span></span>
      <span>DIFF <span class="elo-v">${elo.diff>=0?'+':''}${elo.diff||'--'}</span></span>
    </div>
  </div>`;
}

    chartInst = new Chart(ctx, {
      type:'line',
      data:{labels:hist.map((_,i)=>i===0?'Start':'Bet '+i),
            datasets:[{data:hist,borderColor:isUp?'#00ff87':'#ff3d5a',

// ─── STRATEGY ────────────────────────────────────────

async function loadStrategy() {
  const c = document.getElementById('strategy-container');
  try {
    const [pred, bt] = await Promise.all([
      fetch('./predictions.json?t='+Date.now()).then(r=>r.json()).catch(()=>null),
      fetch('./backtest.json?t='+Date.now()).then(r=>r.json()).catch(()=>null),
    ]);

    const games    = pred?.games || [];
    const ms       = pred?.model_stats || {};
    const fi       = bt?.feature_importance || [];
    const ml       = bt?.ml || {};
    const monthly  = bt?.monthly || [];

    const acc      = ml.accuracy ? (ml.accuracy*100).toFixed(1) : null;
    const accNum   = parseFloat(acc||0);
    const trainGms = bt?.train_games || '--';
    const allRecs  = games.flatMap(g => g.recommendations || []);

    // Today's game plan
    const todayPlan = games.map(g => {
      const recs   = g.recommendations || [];
      const inj    = g.home_injuries || {};
      const injA   = g.away_injuries || {};
      const starOut= inj.star_out || injA.star_out;
      const homeP  = (g.home_win_prob||0.5)*100;
      const awayP  = (g.away_win_prob||0.5)*100;

      if (!recs.length) {
        let reason = `Model: ${g.home||g.matchup?.split(' vs ')[0]||'Home'} ${homeP.toFixed(1)}% / ${g.away||g.matchup?.split(' vs ')[1]||'Away'} ${awayP.toFixed(1)}%.`;
        reason += ' No bet — model edge vs Pinnacle no-vig is below the 3% minimum threshold.';
        if (starOut) reason += ' ⚠ Star player confirmed out — lines may shift.';
        return {matchup:g.matchup,grade:'PASS',action:'PASS — no qualifying edge found',rationale:reason,cls:'skip'};
      }

      const top    = [...recs].sort((a,b)=>b.edge-a.edge)[0];
      const action = `BET ${top.team} ${top.side} @ ${fmtOdds(top.odds)} — ${top.kelly_pct}% of bankroll (quarter-Kelly)`;
      const rationale = top.reason + (top.top_factors?.length ? `. Key factors: ${top.top_factors.slice(0,3).join(', ')}.` : '');
      return {matchup:g.matchup,grade:top.grade,action,rationale,cls:top.grade==='A'?'':(top.grade==='B'?'warn':'skip')};
    });

    const modelOk  = accNum >= 55;
    const accColor = accNum >= 62 ? 'var(--green)' : accNum >= 55 ? 'var(--yellow)' : 'var(--red)';
    const gradeAToday = allRecs.filter(r=>r.grade==='A').length;
    const gradeBToday = allRecs.filter(r=>r.grade==='B').length;

    const bestM  = monthly.length ? monthly.reduce((a,b)=>a.accuracy>b.accuracy?a:b) : null;
    const worstM = monthly.length ? monthly.reduce((a,b)=>a.accuracy<b.accuracy?a:b) : null;

    c.innerHTML = `

      <!-- ══ WHAT THE MODEL ANALYZES ══ -->
      <div class="section-title">WHAT THE MODEL ANALYZES</div>
      <div class="pillar-grid">
        <div class="pillar">
          <div class="pillar-icon">📊</div>
          <div class="pillar-title">Team Performance</div>
          <div class="pillar-body">Rolling averages over the last 5, 10, and 20 games for points scored, points allowed, scoring margin, and pace. Exponentially weighted trends that give more weight to recent games. Net rating (offensive efficiency minus defensive efficiency) per 100 possessions.</div>
        </div>
        <div class="pillar">
          <div class="pillar-icon">🏆</div>
          <div class="pillar-title">Historical Strength (Elo)</div>
          <div class="pillar-body">Each team has an Elo rating that updates after every game based on the result and margin of victory. A team's current Elo reflects their true strength over the whole season — not just recent games. The Elo difference between two teams predicts the expected win probability without any other data.</div>
        </div>
        <div class="pillar">
          <div class="pillar-icon">😴</div>
          <div class="pillar-title">Rest &amp; Fatigue</div>
          <div class="pillar-body">Days of rest since the last game (capped at 14 days). Back-to-back flag when a team plays on consecutive days. Teams on back-to-backs — especially on the road — underperform expectations and this signal is used to reduce confidence and bet size.</div>
        </div>
        <div class="pillar">
          <div class="pillar-icon">🧑‍🤝‍🧑</div>
          <div class="pillar-title">Roster Quality</div>
          <div class="pillar-body">Current-season player stats: points, rebounds, assists, field goal %, three-point %, Box Plus/Minus (BPM), Player Efficiency Rating (PER), and Value Over Replacement (VORP). These are summed per team and compared — a large quality gap between rosters is a significant predictor.</div>
        </div>
      </div>

      <!-- ══ HOW IT WORKS ══ -->
      <div class="section-title">HOW A PREDICTION IS MADE</div>
      <div class="flow">
        <div class="flow-step">
          <div class="flow-n">01</div>
          <div class="flow-title">Build Features</div>
          <div class="flow-body">For each upcoming game, the model computes ~60 features per team — rolling stats, Elo, rest, and roster quality — all based only on information available before tip-off. No future data leaks in.</div>
        </div>
        <div class="flow-step">
          <div class="flow-n">02</div>
          <div class="flow-title">Run Two Models</div>
          <div class="flow-body">Logistic Regression (LR) and XGBoost (XGB) each produce a win probability independently. They were trained on ${trainGms} completed games from the last 4 seasons. Both are shown separately so you can see if they agree.</div>
        </div>
        <div class="flow-step">
          <div class="flow-n">03</div>
          <div class="flow-title">Blend the Prediction</div>
          <div class="flow-body">The final win probability is a weighted blend: 45% from LR + 55% from XGB. LR is stable and well-calibrated; XGB captures non-linear patterns. When both models agree within 5%, the signal is stronger.</div>
        </div>
        <div class="flow-step">
          <div class="flow-n">04</div>
          <div class="flow-title">Compare to Pinnacle</div>
          <div class="flow-body">Pinnacle sportsbook is the sharpest market in the world. Their moneyline odds — with the bookmaker cut removed ("no-vig") — are the fairest estimate of true probability. If our model says 62% and Pinnacle says 55%, the 7% gap is the potential edge.</div>
        </div>
      </div>

      <!-- ══ UNDERSTANDING THE OUTPUT ══ -->
      <div class="section-title">UNDERSTANDING WHAT YOU SEE ON THE PICKS TAB</div>
      <div class="gloss">
        <div class="gloss-row">
          <div class="gloss-term">Win Probability</div>
          <div class="gloss-def">The model's estimate that the home (left) or away (right) team wins. <strong>62% home</strong> means our model thinks the home team wins about 6 times in 10. The bar shows the split visually. This is NOT the odds — it's the raw probability.</div>
        </div>
        <div class="gloss-row">
          <div class="gloss-term">LR / XGB</div>
          <div class="gloss-def">The individual predictions from each model before blending. <strong>If they're close to each other</strong> (within 5%), the signal is considered consensus and is more reliable. If they diverge significantly, treat the pick with more caution.</div>
        </div>
        <div class="gloss-row">
          <div class="gloss-term">Elo</div>
          <div class="gloss-def">Each team's current rating on a 1000–2000 scale (average is ~1500). Calculated from all games this season, weighted by margin. A team with Elo 1650 is significantly stronger than one at 1450. The Elo difference is one of the most predictive single features.</div>
        </div>
        <div class="gloss-row">
          <div class="gloss-term">Edge</div>
          <div class="gloss-def"><strong>This is the core signal.</strong> Edge = our model's probability minus Pinnacle's no-vig (fair) probability for the same outcome. A +7% edge on a team means our model thinks they're 7 percentage points more likely to win than what Pinnacle's sharpest market is pricing. Edges above 6% are flagged as Grade A.</div>
        </div>
        <div class="gloss-row">
          <div class="gloss-term">No-Vig Prob</div>
          <div class="gloss-def">Pinnacle's moneyline odds converted to probability, with the bookmaker's cut mathematically removed. This is the market's "true" estimate of each team's chances. Comparing our model to this number is more meaningful than comparing to raw odds — because raw odds include the vig (house edge).</div>
        </div>
        <div class="gloss-row">
          <div class="gloss-term">Kelly %</div>
          <div class="gloss-def">The recommended bet size as a percentage of your total bankroll. Already reduced to one-quarter of the full Kelly formula for safety. If Kelly says 4%, and your bankroll is $1,000, bet $40. <strong>Never exceed this amount</strong>, and always hard-cap at 5% regardless of what the formula says.</div>
        </div>
        <div class="gloss-row">
          <div class="gloss-term">Key Factors</div>
          <div class="gloss-def">The 3–6 statistical advantages that most influenced the prediction for this game. An upward arrow (↑) means that factor favors the home team; downward (↓) favors the away team. Examples: "Net rating edge (10g)" means the home team has outscored opponents by more per 100 possessions over the last 10 games.</div>
        </div>
        <div class="gloss-row">
          <div class="gloss-term">EDGE FOUND badge</div>
          <div class="gloss-def">A green card border and "EDGE FOUND" badge means the model found a statistically meaningful gap between its prediction and Pinnacle's no-vig line — at least 3%. Only bet on games with this badge, and only on the specific side flagged in the recommendation section.</div>
        </div>
      </div>

      <!-- ══ GRADES ══ -->
      <div class="section-title">BET GRADES EXPLAINED</div>
      <div class="grade-legend">
        <div class="gl-item">
          <div class="gl-badge A">A</div>
          <div class="gl-title">Grade A — Strong Edge</div>
          <div class="gl-body">Model edge vs Pinnacle no-vig exceeds <strong>6%</strong>. This is the primary bet target. Sized at full quarter-Kelly. These are rare — on most days you'll see 0–2.</div>
        </div>
        <div class="gl-item">
          <div class="gl-badge B">B</div>
          <div class="gl-title">Grade B — Moderate Edge</div>
          <div class="gl-body">Edge between <strong>4–6%</strong>. Worth considering if LR and XGB agree. Reduce size to half Kelly. Skip if the team is on a back-to-back or a star player is out.</div>
        </div>
        <div class="gl-item">
          <div class="gl-badge C">C</div>
          <div class="gl-title">Grade C — Marginal</div>
          <div class="gl-body">Edge between <strong>3–4%</strong>. The vig at most books will erase this advantage. <strong>Do not bet</strong> Grade C — it exists in the model for tracking purposes only.</div>
        </div>
        <div class="gl-item">
          <div class="gl-badge P">PASS</div>
          <div class="gl-title">No Edge Found</div>
          <div class="gl-body">The model's probability is within 3% of Pinnacle's no-vig line. The market has correctly priced this game. <strong>No bet</strong>. Forcing a bet here is how bankrolls get eroded.</div>
        </div>
      </div>

      <!-- ══ BETTING RULES ══ -->
      <div class="section-title">BETTING RULES</div>
      <div class="strategy-grid">
        <div class="strategy-card">
          <div class="sc-title">When to Bet</div>
          <div class="rule"><div class="rule-num">1</div><div><div class="rule-text">Grade A bets only by default</div><div class="rule-sub">Consider Grade B only when LR and XGB are within 5% of each other and there are no injury concerns.</div></div></div>
          <div class="rule"><div class="rule-num">2</div><div><div class="rule-text">Check injuries before betting</div><div class="rule-sub">A star player out can shift the true probability by 5–10%. If a star is listed as out and the line hasn't moved yet, pause.</div></div></div>
          <div class="rule"><div class="rule-num">3</div><div><div class="rule-text">Halve size on back-to-backs</div><div class="rule-sub">Teams playing their second game in two nights underperform. If the flagged side is on a B2B, cut the Kelly % in half.</div></div></div>
          <div class="rule"><div class="rule-num">4</div><div><div class="rule-text">Max 3 bets per day</div><div class="rule-sub">More bets means more variance. Pick the highest-grade, highest-edge games. Skip the rest.</div></div></div>
        </div>
        <div class="strategy-card">
          <div class="sc-title">Bankroll Management</div>
          <div class="rule"><div class="rule-num">1</div><div><div class="rule-text">Use the Kelly % shown — no more</div><div class="rule-sub">The Kelly % is already at one-quarter of the mathematically optimal bet. Going bigger increases ruin risk significantly.</div></div></div>
          <div class="rule"><div class="rule-num">2</div><div><div class="rule-text">Hard cap: 5% per bet</div><div class="rule-sub">No single bet should ever exceed 5% of your total bankroll, regardless of how confident the model is.</div></div></div>
          <div class="rule"><div class="rule-num">3</div><div><div class="rule-text">Shop for the best line</div><div class="rule-sub">The book with the best odds is shown next to each recommendation. Getting -110 instead of -115 on 100 bets adds up to ~$230 in profit.</div></div></div>
          <div class="rule"><div class="rule-num">4</div><div><div class="rule-text">Track closing line value (CLV)</div><div class="rule-sub">If the line moves toward your bet from open to close, you captured real edge. Over time, positive CLV confirms the model is finding genuine inefficiencies.</div></div></div>
        </div>
        <div class="strategy-card full">
          <div class="sc-title">Model Performance Summary</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
            <div style="text-align:center">
              <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:${accColor}">${acc||'--'}%</div>
              <div style="font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:1px">DIRECTIONAL ACCURACY</div>
              <div style="font-size:10px;color:var(--dim);margin-top:2px">Holdout season test</div>
            </div>
            <div style="text-align:center">
              <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--accent)">${ms.ml_xgb_auc ? ms.ml_xgb_auc.toFixed(3) : ms.ml_lr_auc ? ms.ml_lr_auc.toFixed(3) : '--'}</div>
              <div style="font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:1px">XGB AUC SCORE</div>
              <div style="font-size:10px;color:var(--dim);margin-top:2px">0.70+ is excellent for NBA</div>
            </div>
            <div style="text-align:center">
              <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--green)">${gradeAToday}</div>
              <div style="font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:1px">GRADE A TODAY</div>
              <div style="font-size:10px;color:var(--dim);margin-top:2px">6%+ edge vs Pinnacle</div>
            </div>
            <div style="text-align:center">
              <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--yellow)">Pinnacle</div>
              <div style="font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:1px">NO-VIG BASELINE</div>
              <div style="font-size:10px;color:var(--dim);margin-top:2px">Sharp book used for edge calc</div>
            </div>
          </div>
          ${fi.length ? `<div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
            <div style="font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Top Predictive Factors (this model)</div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
              ${fi.slice(0,6).map((f,i)=>`<div style="font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px">
                <span style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--accent);min-width:16px">#${i+1}</span>
                <span>${f.label||f.feature}</span>
              </div>`).join('')}
            </div>
          </div>` : ''}
        </div>
      </div>

      <!-- ══ TODAY'S GAME PLAN ══ -->
      <div class="section-title">TODAY'S GAME PLAN <span style="font-size:10px;color:var(--dim);font-weight:400;letter-spacing:0">${games.length} game${games.length!==1?'s':''} · ${gradeAToday} Grade A · ${gradeBToday} Grade B</span></div>
      ${!games.length ? '<div class="no-data">No game data available. Run the model to generate picks.</div>' :
        todayPlan.map(p=>`
          <div class="today-rec ${p.cls}">
            <div class="tr-header">
              <div class="tr-game">${p.matchup}</div>
              <div class="grade-pill-${p.grade}">${p.grade==='PASS'?'NO BET':'GRADE '+p.grade}</div>
            </div>
            <div class="tr-action">${p.action}</div>
            <div class="tr-rationale">${p.rationale}</div>
          </div>`).join('')
      }
    `;

  } catch(e) {
    c.innerHTML = `<div class="no-data">Strategy unavailable. Run the model first.<br><small style="opacity:0.5">${e.message}</small></div>`;
  }
}

loadAll();
</script>
</body>
</html>
